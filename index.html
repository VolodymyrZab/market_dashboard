<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #161b22;
    --border: #21262d;
    --accent: #00ff88;
    --accent2: #00b4ff;
    --accent3: #ff6b35;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --red: #ff4757;
    --green: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(0.95); }
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .header-meta {
    text-align: right;
  }

  .last-updated {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 6px;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 12px 24px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* SUMMARY CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover {
    border-color: rgba(0,255,136,0.3);
    transform: translateY(-2px);
  }

  .card:hover::before { opacity: 1; }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .card-price {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .card-change {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
  }

  .card-change.up { color: var(--green); }
  .card-change.down { color: var(--red); }

  /* CHART SECTION */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .chart-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .chart-subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .chart-selector {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .chart-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .chart-btn:hover { color: var(--text); border-color: var(--text-muted); }
  .chart-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,255,136,0.05); }

  .chart-wrap {
    position: relative;
    height: 300px;
  }

  /* LOADING / ERROR */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin-left: 12px;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    gap: 12px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-align: center;
  }

  .error-msg strong { color: var(--red); font-size: 14px; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    margin-top: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  footer p {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Staggered card animation */
  .card {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.30s; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon"></div>
        <h1>MARKET <span>PULSE</span></h1>
      </div>
      <div class="header-meta">
        <div class="last-updated">
          <span class="status-dot"></span>
          Last updated: <span id="last-updated-date">Loading...</span>
        </div>
      </div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('stocks', this)">US Stocks</button>
    <button class="tab" onclick="switchTab('indices', this)">Indices</button>
    <button class="tab" onclick="switchTab('crypto', this)">Crypto</button>
  </div>

  <!-- STOCKS TAB -->
  <div id="tab-stocks" class="tab-panel active">
    <div id="stocks-cards" class="cards-grid"></div>
    <div class="chart-section">
      <div class="chart-header">
        <div>
          <div class="chart-title">Price History — 30 Days</div>
          <div class="chart-subtitle">Adjusted close price</div>
        </div>
        <div class="chart-selector" id="stocks-btns"></div>
      </div>
      <div class="chart-wrap">
        <canvas id="stocks-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- INDICES TAB -->
  <div id="tab-indices" class="tab-panel">
    <div id="indices-cards" class="cards-grid"></div>
    <div class="chart-section">
      <div class="chart-header">
        <div>
          <div class="chart-title">Index Performance — 30 Days</div>
          <div class="chart-subtitle">ETF proxy: SPY · QQQ · DIA</div>
        </div>
        <div class="chart-selector" id="indices-btns"></div>
      </div>
      <div class="chart-wrap">
        <canvas id="indices-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- CRYPTO TAB -->
  <div id="tab-crypto" class="tab-panel">
    <div id="crypto-cards" class="cards-grid"></div>
    <div class="chart-section">
      <div class="chart-header">
        <div>
          <div class="chart-title">Crypto Price — 30 Days</div>
          <div class="chart-subtitle">USD pairs</div>
        </div>
        <div class="chart-selector" id="crypto-btns"></div>
      </div>
      <div class="chart-wrap">
        <canvas id="crypto-chart"></canvas>
      </div>
    </div>
  </div>

  <footer>
    <p>Data via Polygon.io · Auto-updated weekdays</p>
    <p>Market Pulse Dashboard · VolodymyrZab</p>
  </footer>
</div>

<script>
// ─── Chart defaults ───────────────────────────────────────────────
Chart.defaults.color = '#7d8590';
Chart.defaults.borderColor = '#21262d';
Chart.defaults.font.family = "'Space Mono', monospace";
Chart.defaults.font.size = 10;

const ACCENT_COLORS = ['#00ff88','#00b4ff','#ff6b35','#a78bfa','#fbbf24','#f472b6'];

// ─── Tab switching ────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ─── Format helpers ───────────────────────────────────────────────
function fmt(n) {
  if (n >= 1000) return '$' + n.toLocaleString('en-US', {maximumFractionDigits: 0});
  if (n >= 1) return '$' + n.toFixed(2);
  return '$' + n.toFixed(4);
}

function pct(a, b) {
  const p = ((b - a) / a * 100);
  return (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
}

function tsToDate(ms) {
  return new Date(ms).toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

// ─── Build summary cards ──────────────────────────────────────────
function buildCards(containerId, items) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(({label, bars}) => {
    if (!bars || bars.length < 2) return;
    const last = bars[bars.length - 1];
    const prev = bars[bars.length - 2];
    const change = pct(prev.c, last.c);
    const up = last.c >= prev.c;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-label">${label}</div>
      <div class="card-price">${fmt(last.c)}</div>
      <div class="card-change ${up ? 'up' : 'down'}">${up ? '▲' : '▼'} ${change}</div>
    `;
    el.appendChild(card);
  });
}

// ─── Build chart with selector buttons ───────────────────────────
function buildChart(canvasId, btnContainerId, items) {
  const canvas = document.getElementById(canvasId);
  const btnContainer = document.getElementById(btnContainerId);
  let currentChart = null;
  let activeIndex = 0;

  function renderChart(idx) {
    activeIndex = idx;
    // update buttons
    btnContainer.querySelectorAll('.chart-btn').forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });

    const {label, bars} = items[idx];
    if (!bars || bars.length === 0) return;

    const labels = bars.map(b => tsToDate(b.t));
    const prices = bars.map(b => b.c);
    const color = ACCENT_COLORS[idx % ACCENT_COLORS.length];

    if (currentChart) currentChart.destroy();

    currentChart = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label,
          data: prices,
          borderColor: color,
          backgroundColor: color + '12',
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 4,
          pointHoverBackgroundColor: color,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0d1117',
            borderColor: '#21262d',
            borderWidth: 1,
            titleColor: '#7d8590',
            bodyColor: '#e6edf3',
            callbacks: {
              label: ctx => ' ' + fmt(ctx.parsed.y)
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#21262d' },
            ticks: { maxTicksLimit: 8 }
          },
          y: {
            grid: { color: '#21262d' },
            ticks: {
              callback: v => fmt(v)
            }
          }
        }
      }
    });
  }

  // create buttons
  items.forEach(({label}, i) => {
    const btn = document.createElement('button');
    btn.className = 'chart-btn' + (i === 0 ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => renderChart(i);
    btnContainer.appendChild(btn);
  });

  renderChart(0);
}

// ─── Main: load data ──────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('data/market_data.json');
    if (!res.ok) throw new Error('Could not load data/market_data.json');
    const data = await res.json();

    // Last updated
    document.getElementById('last-updated-date').textContent = data.last_updated || 'Unknown';

    // Stocks
    const stockItems = Object.entries(data.stocks || {}).map(([k, v]) => ({label: k, bars: v}));
    buildCards('stocks-cards', stockItems);
    if (stockItems.length) buildChart('stocks-chart', 'stocks-btns', stockItems);

    // Indices
    const indexItems = Object.entries(data.indices || {}).map(([k, v]) => ({label: k, bars: v}));
    buildCards('indices-cards', indexItems);
    if (indexItems.length) buildChart('indices-chart', 'indices-btns', indexItems);

    // Crypto
    const cryptoItems = Object.entries(data.crypto || {}).map(([k, v]) => ({label: k.replace('USD',''), bars: v}));
    buildCards('crypto-cards', cryptoItems);
    if (cryptoItems.length) buildChart('crypto-chart', 'crypto-btns', cryptoItems);

  } catch (err) {
    ['stocks-cards','indices-cards','crypto-cards'].forEach(id => {
      document.getElementById(id).innerHTML = `
        <div class="error-msg" style="grid-column:1/-1">
          <strong>Data not found</strong>
          <span>Run fetch_data.py first, then open this file.<br>${err.message}</span>
        </div>`;
    });
    document.getElementById('last-updated-date').textContent = 'Error';
  }
}

loadData();
</script>
</body>
</html>
